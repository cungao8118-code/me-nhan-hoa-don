<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>App Lay Hoa Don Cho Me</title>
<style>
body{font-family:sans-serif; max-width:600px; margin:40px auto; padding:20px; background:#fef9ef}
.card{background:white; padding:30px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1)}
h1{color:#e67e22; text-align:center}
button{background:#e67e22; color:white; border:none; padding:15px 30px; border-radius:10px; font-size:18px; width:100%; cursor:pointer}
input{width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd}
#result{margin-top:20px; padding:20px; background:#f9f9f9; border-radius:10px; display:none}
</style>
</head>
<body>
<div class="card">
<h1>📄 App Lấy Hóa Đơn Cho Mẹ</h1>
<p style="text-align:center">Tải ảnh hóa đơn lên để lấy thông tin tự động</p>
<input type="file" id="file" accept="image/*">
<button onclick="upload()">Tải Lên & Nhận Diện</button>
<div id="result"></div>
</div>
<script>
async function upload(){
  const f=document.getElementById('file').files[0];
  if(!f){alert('Mẹ ơi chọn ảnh hóa đơn đã!'); return}
  const fd=new FormData(); fd.append('invoice',f);
  const resEl=document.getElementById('result');
  resEl.style.display='block'; resEl.innerHTML='Đang xử lý...';
  try{
    const r=await fetch('/api/extract',{method:'POST', body:fd});
    const j=await r.json();
    resEl.innerHTML=`<h3>Kết quả:</h3><pre>${JSON.stringify(j.data,null,2)}</pre>`;
  }catch(e){resEl.innerHTML='Lỗi: '+e.message}
}
</script>
</body>
</html>
